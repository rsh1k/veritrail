name: Publish to PyPI

# Builds and publishes the package to PyPI when you publish a GitHub Release.
# Uses PyPI Trusted Publishing (OIDC) — no API tokens or secrets to manage.
#
# One-time setup on PyPI (pypi.org -> account -> Publishing -> add a pending
# publisher) with these exact values:
#   PyPI project name: veritrail
#   Owner:             rsh1k
#   Repository:        veritrail
#   Workflow name:     publish-pypi.yml
#   Environment:       pypi

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Verify metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
