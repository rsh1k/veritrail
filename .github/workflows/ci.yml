name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: veritrail
          POSTGRES_PASSWORD: veritrail
          POSTGRES_DB: veritrail
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U veritrail"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      VERITRAIL_TEST_PG: postgresql://veritrail:veritrail@localhost:5432/veritrail

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev,postgres]"
      - name: Run tests (including Postgres integration)
        run: pytest -q
