name: Release

# Builds and publishes the Docker image to GitHub Container Registry (GHCR)
# whenever you push a version tag, e.g.:
#
#     git tag v0.2.0
#     git push origin v0.2.0
#
# The image lands at ghcr.io/<owner>/<repo>, tagged with the semver
# (v0.2.0, 0.2, etc.) and "latest". No secrets to configure — the workflow
# authenticates with the built-in GITHUB_TOKEN.

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # required to push to GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true       # attach build provenance attestation
          cache-from: type=gha
          cache-to: type=gha,mode=max
